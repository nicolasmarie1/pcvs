---
# Please here defines nodes like regular TEs
# None of these templates will be unrolled
# first-level keys can then be used in `group' field
GRPMPI:
  run:
    iterate:
      inherit: ["n_mpi", "n_node", "n_core"]
GRPMPI_NOTHREADS:
  run:
    iterate:
      inherit: ["n_mpi", "n_node"]
GRPOMP:
  run:
    iterate:
      inherit: ["n_omp", "n_core"]
GRPSERIAL:
  run:
    iterate:
      inherit: []

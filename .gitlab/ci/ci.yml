---

.run:
  variables:
    CHILD_PIPELINE_NAME: '${CI_JOB_NAME}'
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
  trigger:
    strategy: 'mirror'
    include: '/.gitlab/ci/run.yml'
    forward:
      pipeline_variables: true


python_3.10:
  extends: ['.run']
  variables:
    VERSION: "3.10.19"
    RUN_DOC: false
    DEPLOY_DOC: false

python_3.11:
  extends: ['.run']
  variables:
    VERSION: "3.11.14"
    RUN_DOC: false
    DEPLOY_DOC: false

python_3.12:
  extends: ['.run']
  variables:
    VERSION: "3.12.12"
    RUN_DOC: true
    DEPLOY_DOC: true

python_3.13:
  extends: ['.run']
  variables:
    VERSION: "3.13.11"
    RUN_DOC: true
    DEPLOY_DOC: false
